<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piped Frontend - Видео Плеер</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Piped Frontend</h1>
            <form id="searchForm" class="search-form">
                <input type="text" id="searchInput" placeholder="Поиск видео, каналов..." required>
                <select id="searchType">
                    <option value="all">Всё</option>
                    <option value="video">Видео</option>
                    <option value="channel">Каналы</option>
                    <option value="playlist">Плейлисты</option>
                </select>
                <button type="submit">Поиск</button>
            </form>
        </div>
    </header>

    <main class="container">
        <!-- Страница поиска/главная -->
        <section id="searchResults" class="results-section">
            <div id="trendingSection" class="trending-section">
                <h2>Популярное сейчас</h2>
                <div id="trendingVideos" class="video-grid"></div>
            </div>
            <div id="searchResultsGrid" class="video-grid"></div>
        </section>

        <!-- Страница просмотра видео -->
        <section id="videoPlayer" class="player-section hidden">
            <button id="backButton" class="back-btn">← Назад к поиску</button>
            <div class="player-container">
                <div id="playerWrapper" class="player-wrapper">
                    <div id="playerPlaceholder" class="player-placeholder">
                        <p>Загрузка плеера...</p>
                    </div>
                </div>
                <div class="player-info">
                    <h2 id="videoTitle">Название видео</h2>
                    <div class="video-meta">
                        <span id="videoViews">0 просмотров</span>
                        <span id="videoDate"></span>
                    </div>
                    <div class="channel-info">
                        <img id="channelAvatar" src="" alt="Channel">
                        <div>
                            <h3 id="channelName">Название канала</h3>
                            <button id="subscribeBtn" class="subscribe-btn">Подписаться</button>
                        </div>
                    </div>
                    <p id="videoDescription" class="description"></p>
                </div>
                
                <!-- Комментарии -->
                <div class="comments-section">
                    <h3>Комментарии</h3>
                    <div id="commentsList" class="comments-list"></div>
                </div>
            </div>
        </section>

        <!-- Страница канала -->
        <section id="channelPage" class="channel-section hidden">
            <button id="backToSearchBtn" class="back-btn">← Назад к поиску</button>
            <div class="channel-header">
                <img id="channelPageAvatar" src="" alt="Channel Avatar" class="channel-avatar-large">
                <div class="channel-page-info">
                    <h1 id="channelPageName">Название канала</h1>
                    <p id="channelPageSubscribers">0 подписчиков</p>
                    <p id="channelPageDescription" class="channel-description"></p>
                </div>
            </div>
            <div class="channel-videos">
                <h2>Видео канала</h2>
                <div id="channelVideosGrid" class="video-grid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Piped Frontend - Альтернативный интерфейс для YouTube</p>
            <p>Используемые инстансы: <span id="currentInstance"></span></p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
