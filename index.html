<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        .app {
            height: 100vh;
            position: relative;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff0050, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Search Modal */
        .search-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            padding: 20px;
        }

        .search-modal.active {
            display: block;
        }

        .search-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            margin-right: 10px;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .close-search {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .search-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .filter-btn.active {
            background: #ff0050;
        }

        .search-results {
            height: calc(100vh - 160px);
            overflow-y: auto;
        }

        .search-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .search-thumbnail {
            width: 80px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-right: 15px;
            background-size: cover;
            background-position: center;
        }

        .search-info {
            flex: 1;
        }

        .search-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .search-channel {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .search-stats {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Video Container */
        .video-container {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
            scroll-snap-type: y mandatory;
        }

        .video-item {
            width: 100%;
            height: 100%;
            position: relative;
            scroll-snap-align: start;
            background: #000;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Video Info Overlay */
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            padding: 20px;
            z-index: 10;
        }

        .video-info {
            margin-bottom: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .video-channel {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .video-stats {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Side Actions */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            z-index: 20;
        }

        .action-btn {
            display: block;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff0050;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .error-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .error-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* API Key Setup */
        .api-setup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 300;
            max-width: 350px;
            width: 90%;
        }

        .api-setup h3 {
            margin-bottom: 15px;
            color: #ff0050;
        }

        .api-setup p {
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
        }

        .api-input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .api-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .api-buttons {
            display: flex;
            gap: 10px;
        }

        .api-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .api-btn.primary {
            background: #ff0050;
            color: white;
        }

        .api-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header {
                padding: 0 15px;
            }

            .video-overlay {
                padding: 15px;
            }

            .side-actions {
                right: 10px;
                bottom: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="logo">TikTube</div>
            <button class="search-btn" onclick="openSearch()">🔍</button>
        </div>

        <!-- Search Modal -->
        <div class="search-modal" id="searchModal">
            <div class="search-header">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск видео или каналов...">
                <button class="close-search" onclick="closeSearch()">×</button>
            </div>
            
            <div class="search-filters">
                <button class="filter-btn active" data-type="video">Видео</button>
                <button class="filter-btn" data-type="channel">Каналы</button>
            </div>
            
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Video Container -->
        <div class="video-container" id="videoContainer">
            <!-- Видео будут загружаться динамически -->
        </div>

        <!-- API Key Setup Modal -->
        <div class="api-setup" id="apiSetup">
            <h3>Настройка YouTube API</h3>
            <p>Для работы приложения необходим API ключ YouTube Data API v3. Получите его в Google Cloud Console.</p>
            <input type="text" class="api-input" id="apiKeyInput" placeholder="Введите ваш API ключ">
            <div class="api-buttons">
                <button class="api-btn primary" onclick="saveApiKey()">Сохранить</button>
                <button class="api-btn secondary" onclick="showDemo()">Демо режим</button>
            </div>
        </div>
    </div>

    <script>
        class TikTokClone {
            constructor() {
                this.apiKey = localStorage.getItem('youtube_api_key') || '';
                this.currentVideos = [];
                this.currentIndex = 0;
                this.searchType = 'video';
                this.isLoading = false;
                
                this.init();
            }

            init() {
                if (!this.apiKey) {
                    this.showApiSetup();
                } else {
                    this.hideApiSetup();
                    this.loadTrendingVideos();
                }

                this.setupEventListeners();
            }

            showApiSetup() {
                document.getElementById('apiSetup').style.display = 'block';
            }

            hideApiSetup() {
                document.getElementById('apiSetup').style.display = 'none';
            }

            setupEventListeners() {
                // Search input
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', this.debounce(() => {
                    if (searchInput.value.trim()) {
                        this.performSearch(searchInput.value.trim());
                    }
                }, 500));

                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.searchType = e.target.dataset.type;
                        
                        const query = searchInput.value.trim();
                        if (query) {
                            this.performSearch(query);
                        }
                    });
                });

                // Swipe/Scroll handling for video navigation
                this.setupVideoNavigation();
            }

            setupVideoNavigation() {
                const container = document.getElementById('videoContainer');
                let startY = 0;
                let currentY = 0;
                let isScrolling = false;

                container.addEventListener('touchstart', (e) => {
                    startY = e.touches[0].clientY;
                });

                container.addEventListener('touchmove', (e) => {
                    currentY = e.touches[0].clientY;
                    isScrolling = true;
                });

                container.addEventListener('touchend', (e) => {
                    if (!isScrolling) return;
                    
                    const diff = startY - currentY;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) {
                            this.nextVideo();
                        } else {
                            this.prevVideo();
                        }
                    }
                    isScrolling = false;
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowDown') this.nextVideo();
                    if (e.key === 'ArrowUp') this.prevVideo();
                });
            }

            async loadTrendingVideos() {
                if (!this.apiKey) return;

                this.showLoading();
                
                try {
                    const response = await fetch(
                        `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=RU&maxResults=50&videoCategoryId=10&key=${this.apiKey}`
                    );

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    this.currentVideos = data.items || [];
                    this.currentIndex = 0;
                    this.displayVideos();
                } catch (error) {
                    console.error('Error loading trending videos:', error);
                    this.showError('Ошибка загрузки видео', 'Проверьте API ключ и подключение к интернету');
                }
            }

            async performSearch(query) {
                if (!this.apiKey) return;

                const resultsContainer = document.getElementById('searchResults');
                resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

                try {
                    let url;
                    if (this.searchType === 'video') {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(query)}&maxResults=25&order=relevance&key=${this.apiKey}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(query)}&maxResults=25&order=relevance&key=${this.apiKey}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Search failed: ${response.status}`);
                    
                    const data = await response.json();
                    this.displaySearchResults(data.items || []);
                } catch (error) {
                    console.error('Search error:', error);
                    resultsContainer.innerHTML = '<div class="error-message">Ошибка поиска</div>';
                }
            }

            displaySearchResults(items) {
                const container = document.getElementById('searchResults');
                
                if (items.length === 0) {
                    container.innerHTML = '<div class="error-message">Ничего не найдено</div>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    const thumbnail = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
                    const title = item.snippet.title;
                    const channelTitle = item.snippet.channelTitle;
                    
                    return `
                        <div class="search-item" onclick="app.selectSearchResult('${item.id.videoId || item.id.channelId}', '${this.searchType}')">
                            <div class="search-thumbnail" style="background-image: url('${thumbnail}')"></div>
                            <div class="search-info">
                                <div class="search-title">${this.escapeHtml(title)}</div>
                                <div class="search-channel">${this.escapeHtml(channelTitle)}</div>
                                <div class="search-stats">${this.searchType === 'video' ? 'Видео' : 'Канал'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            async selectSearchResult(id, type) {
                if (type === 'video') {
                    // Load single video
                    try {
                        const response = await fetch(
                            `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=${this.apiKey}`
                        );
                        const data = await response.json();
                        if (data.items && data.items.length > 0) {
                            this.currentVideos = data.items;
                            this.currentIndex = 0;
                            this.displayVideos();
                            this.closeSearch();
                        }
                    } catch (error) {
                        console.error('Error loading video:', error);
                    }
                } else {
                    // Load channel videos
                    try {
                        const response = await fetch(
                            `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${id}&type=video&order=date&maxResults=50&key=${this.apiKey}`
                        );
                        const data = await response.json();
                        if (data.items && data.items.length > 0) {
                            // Get detailed video info
                            const videoIds = data.items.map(item => item.id.videoId).join(',');
                            const videosResponse = await fetch(
                                `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoIds}&key=${this.apiKey}`
                            );
                            const videosData = await videosResponse.json();
                            
                            this.currentVideos = videosData.items || [];
                            this.currentIndex = 0;
                            this.displayVideos();
                            this.closeSearch();
                        }
                    } catch (error) {
                        console.error('Error loading channel videos:', error);
                    }
                }
            }

            displayVideos() {
                const container = document.getElementById('videoContainer');
                
                if (this.currentVideos.length === 0) {
                    this.showError('Нет видео', 'Попробуйте выполнить поиск или обновить страницу');
                    return;
                }

                container.innerHTML = this.currentVideos.map((video, index) => {
                    const videoId = video.id;
                    const snippet = video.snippet;
                    const statistics = video.statistics || {};
                    
                    const viewCount = this.formatNumber(statistics.viewCount || 0);
                    const likeCount = this.formatNumber(statistics.likeCount || 0);
                    
                    return `
                        <div class="video-item" data-index="${index}">
                            <iframe 
                                class="video-iframe" 
                                src="https://www.youtube.com/embed/${videoId}?autoplay=${index === 0 ? 1 : 0}&mute=1&controls=1&rel=0&modestbranding=1"
                                frameborder="0" 
                                allowfullscreen
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                            </iframe>
                            
                            <div class="video-overlay">
                                <div class="video-info">
                                    <div class="video-title">${this.escapeHtml(snippet.title)}</div>
                                    <div class="video-channel">${this.escapeHtml(snippet.channelTitle)}</div>
                                    <div class="video-stats">${viewCount} просмотров • ${likeCount} лайков</div>
                                </div>
                            </div>
                            
                            <div class="side-actions">
                                <button class="action-btn" onclick="app.toggleLike(${index})">❤️</button>
                                <button class="action-btn" onclick="app.shareVideo(${index})">📤</button>
                                <button class="action-btn" onclick="app.openChannel('${snippet.channelId}')">👤</button>
                            </div>
                        </div>
                    `;
                }).join('');

                this.updateVideoPosition();
            }

            updateVideoPosition() {
                const container = document.getElementById('videoContainer');
                const targetY = -this.currentIndex * window.innerHeight;
                container.style.transform = `translateY(${targetY}px)`;
                
                // Update iframe autoplay
                document.querySelectorAll('.video-iframe').forEach((iframe, index) => {
                    const src = iframe.src.replace(/autoplay=\d/, `autoplay=${index === this.currentIndex ? 1 : 0}`);
                    if (src !== iframe.src) {
                        iframe.src = src;
                    }
                });
            }

            nextVideo() {
                if (this.currentIndex < this.currentVideos.length - 1) {
                    this.currentIndex++;
                    this.updateVideoPosition();
                }
            }

            prevVideo() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.updateVideoPosition();
                }
            }

            toggleLike(index) {
                const btn = document.querySelector(`[data-index="${index}"] .action-btn`);
                btn.style.color = btn.style.color === 'red' ? 'white' : 'red';
            }

            shareVideo(index) {
                const video = this.currentVideos[index];
                const url = `https://youtube.com/watch?v=${video.id}`;
                
                if (navigator.share) {
                    navigator.share({
                        title: video.snippet.title,
                        url: url
                    });
                } else {
                    navigator.clipboard.writeText(url);
                    this.showToast('Ссылка скопирована!');
                }
            }

            openChannel(channelId) {
                window.open(`https://youtube.com/channel/${channelId}`, '_blank');
            }

            showLoading() {
                document.getElementById('videoContainer').innerHTML = 
                    '<div class="loading"><div class="spinner"></div></div>';
            }

            showError(title, message) {
                document.getElementById('videoContainer').innerHTML = `
                    <div class="error-message">
                        <div class="error-title">${title}</div>
                        <div class="error-text">${message}</div>
                    </div>
                `;
            }

            showToast(message) {
                // Simple toast implementation
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `
                    position: fixed;
                    bottom: 100px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 10px 20px;
                    border-radius: 20px;
                    z-index: 1000;
                    font-size: 14px;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            formatNumber(num) {
                const n = parseInt(num) || 0;
                if (n >= 1000000) return Math.floor(n / 100000) / 10 + 'M';
                if (n >= 1000) return Math.floor(n / 100) / 10 + 'K';
                return n.toString();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }
        }

        // Global functions for HTML onclick handlers
        function openSearch() {
            document.getElementById('searchModal').classList.add('active');
            document.getElementById('searchInput').focus();
        }

        function closeSearch() {
            document.getElementById('searchModal').classList.remove('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (apiKey) {
                localStorage.setItem('youtube_api_key', apiKey);
                app.apiKey = apiKey;
                app.hideApiSetup();
                app.loadTrendingVideos();
            } else {
                alert('Пожалуйста, введите API ключ');
            }
        }

        function showDemo() {
            alert('Для полной функциональности необходим YouTube API ключ. Получите его на https://console.cloud.google.com/');
        }

        // Initialize app
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new TikTokClone();
        });
    </script>
</body>
</html>
